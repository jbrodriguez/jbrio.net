{{define "pagination"}}
<div class="flex items-center justify-center">
  <div>
    {{if .PrevURL}}
      <a href="{{.PrevURL}}" class="inline-block py-2 px-4 text-lg rounded border-2 bg-secondary-600 hover:bg-secondary-700 border-secondary-400 hover:border-secondary-900 text-bg-100">
        <span class="flex justify-center items-center">
          <svg class="w-3.5 h-3.5 me-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5H1m0 0 4 4M1 5l4-4"/>
          </svg>
          Prev Page
        </span>
      </a>
    {{else}}
      <span class="inline-block py-2 px-4 text-lg rounded border-2 text-text-300 cursor-not-allowed">Prev Page</span>
    {{end}}
  </div>
  <div class="px-8 text-text-400">{{.PageNum}} of {{.TotalPages}}</div>
  <div>
    {{if .NextURL}}
      <a href="{{.NextURL}}" class="inline-block py-2 px-4 text-lg rounded border-2 bg-secondary-600 hover:bg-secondary-700 border-secondary-400 hover:border-secondary-900 text-bg-100">
        <span class="flex justify-center items-center">
          Next Page
          <svg class="w-3.5 h-3.5 ms-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 5h12m0 0L9 1m4 4L9 9"/>
          </svg>
        </span>
      </a>
    {{else}}
      <span class="inline-block py-2 px-4 text-lg rounded border-2 text-text-300 cursor-not-allowed">Next Page</span>
    {{end}}
  </div>
</div>
{{end}}
