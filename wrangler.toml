# Cloudflare Workers (Static Assets) config for jbrio.net.
# Assets-only Worker: serves the ssg build output in dist/ directly — there is
# no server script (the old Astro SSR worker.js is gone). Workers Builds reads
# this to know what to deploy after running the build command.
name = "jbrio-net"
compatibility_date = "2025-08-07"

[assets]
directory = "./dist"
# Serve the generated dist/404.html on unmatched routes.
not_found_handling = "404-page"
