name: Build & Deploy

# Replicates the old Astro GitHub Action on the ssg stack: build with ssg, then
# deploy to the jbrio-net Worker with wrangler (same as before — no Git
# integration / "Connect" needed).
#
#   push to main          -> wrangler deploy        (production) + announce posts
#   push to another branch -> wrangler versions upload (preview URL, prod untouched)
on:
  push:
    branches: [main, ssg]
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Post to announce on social (e.g. data/posts/202545/index.md)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to detect newly-added posts

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Tailwind CSS (standalone CLI)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64" -o "$HOME/.local/bin/tailwindcss"
          chmod +x "$HOME/.local/bin/tailwindcss"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install ssg
        env:
          # Fetch ssg straight from GitHub so @latest reflects the just-pushed
          # commit instead of a stale proxy.golang.org cache.
          GOPROXY: direct
          GOSUMDB: "off"
        run: |
          go install github.com/jbrodriguez/ssg/cmd/ssg@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build site
        run: ssg build

      - name: Deploy (main) or upload preview version (other branches)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eo pipefail
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Deploying to production…"
            npx --yes wrangler@4 deploy
          else
            echo "Uploading preview version for branch '${{ github.ref_name }}'…"
            npx --yes wrangler@4 versions upload 2>&1 | tee /tmp/wrangler.log
            echo "## 🔍 Preview deployment" >> "$GITHUB_STEP_SUMMARY"
            grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev[^ ]*' /tmp/wrangler.log | head -1 >> "$GITHUB_STEP_SUMMARY" || true
          fi

      # --- announce new posts: production (main) + manual runs only ---
      - name: Detect newly-added posts
        id: changes
        if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES="${{ inputs.post_file }}"
          else
            FILES=$(git diff --name-status HEAD~1 HEAD -- data/posts \
              | grep '^A' | cut -f2 | grep '/index.md$' || true)
          fi
          # Safety cap: a normal publish adds ~1 post. A large batch (the
          # migration merge, a bulk frontmatter edit, a path move) is almost
          # certainly not something to broadcast — skip to avoid mass-announcing.
          # Announce a specific post intentionally via workflow_dispatch.
          COUNT=$(printf '%s\n' "$FILES" | grep -c '/index.md$' || true)
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$COUNT" -gt 3 ]; then
            echo "::warning::$COUNT new posts detected — skipping social announce (looks like a bulk change)."
            FILES=""
          fi
          echo "Detected new posts: ${FILES:-<none>}"
          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Announce on social media
        if: steps.changes.outputs.files != ''
        env:
          # Install sp straight from GitHub (direct, no proxy) so @latest is
          # fresh. The install lives here so it only runs when there's actually
          # a post to announce.
          GOPROXY: direct
          GOSUMDB: "off"
          SITE_URL: https://jbrio.net
          DEPLOYMENT_DELAY_MS: '30000'
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          go install github.com/jbrodriguez/sp@latest
          "$(go env GOPATH)/bin/sp" "${{ steps.changes.outputs.files }}"
