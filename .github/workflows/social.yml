name: Announce new posts

# Deployment is handled by Cloudflare Workers Builds (Git integration), not here.
# This workflow only announces newly-published posts on social media after they
# land on the production branch.
on:
  push:
    branches: [main]
    paths: ['data/posts/**/*.md']
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Post to announce (e.g. data/posts/202545/index.md)'
        required: false
        type: string

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to detect newly-added posts

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Detect newly-added posts
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES="${{ inputs.post_file }}"
          else
            FILES=$(git diff --name-status HEAD~1 HEAD -- data/posts \
              | grep '^A' | cut -f2 | grep '/index.md$' || true)
          fi
          echo "Detected new posts: ${FILES:-<none>}"
          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Announce on social media
        if: steps.changes.outputs.files != ''
        env:
          SITE_URL: https://jbrio.net
          # Give Workers Builds time to deploy before fetching the live page
          # for the Bluesky embed card (falls back to frontmatter otherwise).
          DEPLOYMENT_DELAY_MS: '90000'
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          go build -C tools/social -o /tmp/social .
          /tmp/social "${{ steps.changes.outputs.files }}"
